name: AI Stub Verification & Auto-Commit

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai python-dotenv requests pyyaml

    - name: Set up Java (for WireMock)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Start WireMock Server
      run: |
        java -jar wiremock-standalone-2.35.0.jar --port 8080 &
        echo "Waiting for WireMock..."
        sleep 10
      env:
        # WireMock standalone doesn't need env usually, but we keep it clean
        WIRE_MOCK_OPTS: ""

    - name: Run AI Verification
      run: python verify_all_stubs.py
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Create Update Branch & Commit
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: AI autonomous stub verification and updates"
        branch: ai-stub-updates
        create_branch: true
        push_options: '--force'
        file_pattern: 'wiremock/mappings/*.json'
